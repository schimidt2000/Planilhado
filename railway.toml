[build]
builder = "nixpacks"

[build.nixpacksPlan]
providers = ["node", "python"]

[build.nixpacksPlan.packages]
pkgs = ["nodejs_20", "python312", "python312Packages.pip"]

[build.nixpacksPlan.phases.setup]
cmds = ["pip install pdfplumber"]

[deploy]
startCommand = "npx prisma migrate deploy && npx next start -p 3000"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/api/auth/session"
timeout = 30
