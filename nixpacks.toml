providers = ["node"]

[phases.setup]
nixPkgs = ["...", "python312"]

[phases.install]
cmds = ["...", "python -m venv --copies /opt/venv && /opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["/opt/venv/bin/python -c \"import pdfplumber; print('pdfplumber ready')\"", "..."]

[variables]
PYTHON_PATH = "/opt/venv/bin/python"
